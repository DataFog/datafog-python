[tox]
envlist = py310,py311,py312
isolated_build = True

[testenv:integration]
deps =
    pytest==7.4.0
    pytest-asyncio==0.21.0
    pytest-cov
    pyspark>=3.0.0
    -r requirements-dev.txt
extras = all
allowlist_externals =
    tesseract
    pip
    python
commands =
    pip install --no-cache-dir -r requirements-dev.txt
    pip install --no-cache-dir pyspark>=3.0.0
    python run_tests.py -m integration

[testenv]
deps =
    pytest==7.4.0
    pytest-asyncio==0.21.0
    pytest-cov
    -r requirements-dev.txt
extras = all
allowlist_externals =
    tesseract
    pip
    python
commands =
    pip install --no-cache-dir -r requirements-dev.txt
    tesseract --version
    python run_tests.py {posargs}

[testenv:lint]
skip_install = true
deps =
    black
    isort
    flake8
commands =
    black --check .
    isort --check-only .
    flake8 .

[testenv:typecheck]
deps =
    mypy
commands =
    mypy datafog tests

[pytest]
asyncio_mode = auto
markers =
    integration: marks tests as integration tests that may require external dependencies