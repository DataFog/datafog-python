[tox]
envlist = py310,py311,py312
isolated_build = True

[testenv:integration]
deps =
    -r requirements-dev.txt
    pyspark>=3.0.0
extras = all
allowlist_externals =
    tesseract
    pip
    python
commands =
    python run_tests.py -m integration

[testenv]
deps =
    -r requirements-dev.txt
extras = all
allowlist_externals =
    tesseract
    pip
    python
commands =
    tesseract --version
    python run_tests.py {posargs}

[testenv:lint]
skip_install = true
deps =
    black
    isort
    flake8
commands =
    black --check .
    isort --check-only .
    flake8 .

[testenv:typecheck]
deps =
    mypy
commands =
    mypy datafog tests

[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
markers =
    integration: marks tests as integration tests that may require external dependencies
    slow: marks tests as slow and optional for fast CI runs
