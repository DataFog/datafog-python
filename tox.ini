[tox]
envlist = py310,py311,py312
isolated_build = True

[testenv:integration]
deps =
    -r requirements-test.txt
    pyspark>=3.0.0
extras =
    all
    test
allowlist_externals =
    tesseract
    pip
    python
commands =
    python run_tests.py -m integration

[testenv]
deps =
    -r requirements-test.txt
extras =
    all
    test
allowlist_externals =
    tesseract
    pip
    python
commands =
    tesseract --version
    python run_tests.py {posargs}

[testenv:lint]
skip_install = true
deps =
    black==26.3.1
    isort==5.13.2
    flake8==7.0.0
commands =
    black --check .
    isort --check-only .
    flake8 .

[testenv:typecheck]
deps =
    mypy==1.9.0
commands =
    mypy datafog tests

[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
markers =
    integration: marks tests as integration tests that may require external dependencies
    slow: marks tests as slow and optional for fast CI runs
